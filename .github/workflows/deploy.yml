name: Build and Deploy ClockTrack

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore ClockTrack/ClockTrack.csproj

      - name: Build
        run: dotnet build ClockTrack/ClockTrack.csproj --configuration Release --no-restore

      - name: Publish
        run: dotnet publish ClockTrack/ClockTrack.csproj --configuration Release --no-build --output ./publish --runtime win-x64 --self-contained false

      - name: Remove large unnecessary files from publish
        run: |
          rm -rf ./publish/wwwroot/lib/bootstrap-icons/*.svg

      - name: Fix web.config outofprocess
        run: |
          cat > ./publish/web.config << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <configuration>
            <location path="." inheritInChildApplications="false">
              <system.webServer>
                <handlers>
                  <add name="aspNetCore" path="*" verb="*" modules="AspNetCoreModuleV2" resourceType="Unspecified" />
                </handlers>
                <aspNetCore processPath="dotnet" arguments=".\ClockTrack.dll" stdoutLogEnabled="true" stdoutLogFile=".\logs\stdout" hostingModel="outofprocess" />
              </system.webServer>
            </location>
          </configuration>
          EOF

      - name: Show publish size
        run: du -sh ./publish

      - name: Zip publish output
        run: cd ./publish && zip -r ../deploy.zip . && cd ..

      - name: Show zip size
        run: du -sh ./deploy.zip

      - name: Stop App Service before deploy
        env:
          DEPLOY_USER: ${{ secrets.AZURE_DEPLOY_USER }}
          DEPLOY_PASS: ${{ secrets.AZURE_DEPLOY_PASSWORD }}
        run: |
          curl -X POST \
            "https://clocktrack.scm.azurewebsites.net/api/processes/0/stop" \
            -u "${DEPLOY_USER}:${DEPLOY_PASS}" \
            --max-time 30 || true

      - name: Wait for app to stop
        run: sleep 10

      - name: Deploy via Kudu ZIP API
        env:
          DEPLOY_USER: ${{ secrets.AZURE_DEPLOY_USER }}
          DEPLOY_PASS: ${{ secrets.AZURE_DEPLOY_PASSWORD }}
        run: |
          HTTP_STATUS=$(curl -s -o /tmp/deploy_response.txt -w "%{http_code}" \
            -X POST \
            "https://clocktrack.scm.azurewebsites.net/api/zipdeploy?isAsync=false" \
            -u "${DEPLOY_USER}:${DEPLOY_PASS}" \
            --data-binary @deploy.zip \
            -H "Content-Type: application/zip" \
            --max-time 600)
          echo "HTTP Status: $HTTP_STATUS"
          cat /tmp/deploy_response.txt
          if [ "$HTTP_STATUS" != "200" ] && [ "$HTTP_STATUS" != "202" ]; then
            exit 1
          fi
