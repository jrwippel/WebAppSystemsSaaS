name: Build and Deploy ClockTrack

on:
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore ClockTrack/ClockTrack.csproj

      - name: Build
        run: dotnet build ClockTrack/ClockTrack.csproj --configuration Release --no-restore

      - name: Publish
        run: dotnet publish ClockTrack/ClockTrack.csproj --configuration Release --no-build --output ./publish

      - name: Remove bootstrap-icons SVGs
        shell: pwsh
        run: Remove-Item -Path "./publish/wwwroot/lib/bootstrap-icons/*.svg" -Force -ErrorAction SilentlyContinue

      - name: Deploy via MSDeploy
        shell: pwsh
        env:
          DEPLOY_USER: ${{ secrets.AZURE_DEPLOY_USER }}
          DEPLOY_PASS: ${{ secrets.AZURE_DEPLOY_PASSWORD }}
        run: |
          $msdeploy = "C:\Program Files\IIS\Microsoft Web Deploy V3\msdeploy.exe"
          & $msdeploy `
            -verb:sync `
            -source:contentPath="$(Resolve-Path ./publish)" `
            -dest:contentPath="site\wwwroot",computerName="https://clocktrack.scm.azurewebsites.net/msdeploy.axd",userName="$env:DEPLOY_USER",password="$env:DEPLOY_PASS",authType="Basic" `
            -enableRule:AppOffline `
            -retryAttempts:3
