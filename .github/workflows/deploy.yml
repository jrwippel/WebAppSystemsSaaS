name: Build and Deploy ClockTrack

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore ClockTrack/ClockTrack.csproj

      - name: Build
        run: dotnet build ClockTrack/ClockTrack.csproj --configuration Release --no-restore

      - name: Publish
        run: dotnet publish ClockTrack/ClockTrack.csproj --configuration Release --no-build --output ./publish

      - name: Remove bootstrap-icons SVGs
        run: Remove-Item -Path "./publish/wwwroot/lib/bootstrap-icons/*.svg" -Force -ErrorAction SilentlyContinue
        shell: pwsh

      - name: Show publish size
        run: (Get-ChildItem -Recurse ./publish | Measure-Object -Property Length -Sum).Sum / 1MB
        shell: pwsh

      - name: Deploy via WebDeploy
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'clocktrack'
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ./publish
