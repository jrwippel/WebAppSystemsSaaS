<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato - JRWIT | Formulário de Contato</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #000000;
            color: #ffffff;
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .contact-container {
            max-width: 600px;
            width: 100%;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 60px 40px;
            text-align: center;
        }

        .logo {
            font-size: 32px;
            font-weight: 800;
            color: #ffffff;
            margin-bottom: 40px;
            letter-spacing: -0.5px;
        }

        .logo span {
            color: #2254E1;
        }

        h1 {
            font-size: 36px;
            font-weight: 800;
            margin-bottom: 16px;
            letter-spacing: -1px;
        }

        .subtitle {
            font-size: 18px;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 40px;
        }

        .form-group {
            margin-bottom: 24px;
            text-align: left;
        }

        label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
            color: rgba(255, 255, 255, 0.8);
        }

        input, textarea {
            width: 100%;
            padding: 16px 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: #ffffff;
            font-size: 16px;
            font-family: inherit;
            transition: all 0.3s;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: #2254E1;
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 0 3px rgba(34, 84, 225, 0.1);
        }

        input::placeholder, textarea::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        textarea {
            resize: vertical;
            min-height: 120px;
        }

        .btn-submit {
            width: 100%;
            background: #2254E1;
            color: #ffffff;
            padding: 18px 36px;
            border-radius: 12px;
            border: none;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 20px;
        }

        .btn-submit:hover {
            background: #1a42b8;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(34, 84, 225, 0.3);
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: rgba(255, 255, 255, 0.6);
            text-decoration: none;
            font-size: 14px;
            margin-top: 30px;
            transition: color 0.3s;
        }

        .back-link:hover {
            color: #2254E1;
        }

        .success-message {
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.3);
            color: #22c55e;
            padding: 16px 20px;
            border-radius: 12px;
            margin-bottom: 24px;
            display: none;
        }

        @media (max-width: 768px) {
            .contact-container {
                padding: 40px 24px;
            }

            h1 {
                font-size: 28px;
            }
        }
    </style>
</head>
<body>
    <div class="contact-container">
        <div class="logo">JR<span>WIT</span></div>
        
        <h1>Vamos Conversar?</h1>
        <p class="subtitle">Entre em contato e descubra como podemos ajudar seu negócio</p>
        
        <div class="success-message" id="successMessage">
            ✅ Mensagem enviada com sucesso! Entraremos em contato em breve.
        </div>

        <form action="https://formspree.io/f/mnjbeply" method="POST" id="contactForm">
            <div class="form-group">
                <label for="name">Nome *</label>
                <input type="text" id="name" name="name" required placeholder="Seu nome completo">
            </div>

            <div class="form-group">
                <label for="email">Email *</label>
                <input type="email" id="email" name="email" required placeholder="seu@email.com">
            </div>

            <div class="form-group">
                <label for="company">Empresa</label>
                <input type="text" id="company" name="company" placeholder="Nome da sua empresa">
            </div>

            <div class="form-group">
                <label for="subject">Assunto *</label>
                <input type="text" id="subject" name="subject" required placeholder="Como podemos ajudar?">
            </div>

            <div class="form-group">
                <label for="message">Mensagem *</label>
                <textarea id="message" name="message" required placeholder="Conte-nos mais sobre seu projeto ou necessidade..."></textarea>
            </div>

            <button type="submit" class="btn-submit">Enviar Mensagem</button>
        </form>

        <a href="index.html" class="back-link">
            ← Voltar ao site
        </a>
    </div>

    <script>
        document.getElementById('contactForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const form = this;
            const formData = new FormData(form);
            
            fetch(form.action, {
                method: 'POST',
                body: formData,
                headers: {
                    'Accept': 'application/json'
                }
            }).then(response => {
                if (response.ok) {
                    document.getElementById('successMessage').style.display = 'block';
                    form.reset();
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 3000);
                } else {
                    alert('Erro ao enviar mensagem. Tente novamente.');
                }
            }).catch(error => {
                alert('Erro ao enviar mensagem. Tente novamente.');
            });
        });
    </script>
</body>
</html>
